<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Detection Security Center</title>
    <link rel="stylesheet" href="/static/css/style.css?v=10">
</head>
<body>
    <div class="grid">
        <!-- Top-left: North feed -->
        <div class="feed-cell cell-north">
            <div class="feed-panel" id="panel-north" data-feed="north">
                <div class="feed-header">
                    <button class="mark-event-btn" onclick="markEvent(this, 'north')">MARK EVENT</button>
                    <span class="feed-count" id="count-north">0 drones</span>
                </div>
                <div class="feed-container">
                    <img src="/video_feed/north" alt="North Camera Feed">
                    <div class="feed-log-overlay" id="log-north"></div>
                </div>
                <div class="feed-footer">
                    <div class="direction-display" id="directions-north"></div>
                </div>
            </div>
        </div>

        <!-- Top-right: East feed -->
        <div class="feed-cell cell-east">
            <div class="feed-panel" id="panel-east" data-feed="east">
                <div class="feed-header">
                    <button class="mark-event-btn" onclick="markEvent(this, 'east')">MARK EVENT</button>
                    <span class="feed-count" id="count-east">0 drones</span>
                </div>
                <div class="feed-container">
                    <img src="/video_feed/east" alt="East Camera Feed">
                    <div class="feed-log-overlay" id="log-east"></div>
                </div>
                <div class="feed-footer">
                    <div class="direction-display" id="directions-east"></div>
                </div>
            </div>
        </div>

        <!-- Bottom-left: West feed -->
        <div class="feed-cell cell-west">
            <div class="feed-panel" id="panel-west" data-feed="west">
                <div class="feed-header">
                    <button class="mark-event-btn" onclick="markEvent(this, 'west')">MARK EVENT</button>
                    <span class="feed-count" id="count-west">0 drones</span>
                </div>
                <div class="feed-container">
                    <img src="/video_feed/west" alt="West Camera Feed">
                    <div class="feed-log-overlay" id="log-west"></div>
                </div>
                <div class="feed-footer">
                    <div class="direction-display" id="directions-west"></div>
                </div>
            </div>
        </div>

        <!-- Bottom-right: South feed -->
        <div class="feed-cell cell-south">
            <div class="feed-panel" id="panel-south" data-feed="south">
                <div class="feed-header">
                    <button class="mark-event-btn" onclick="markEvent(this, 'south')">MARK EVENT</button>
                    <span class="feed-count" id="count-south">0 drones</span>
                </div>
                <div class="feed-container">
                    <img src="/video_feed/south" alt="South Camera Feed">
                    <div class="feed-log-overlay" id="log-south"></div>
                </div>
                <div class="feed-footer">
                    <div class="direction-display" id="directions-south"></div>
                </div>
            </div>
        </div>

        <!-- Center overlay: compass + controls -->
        <div class="center-cell">
            <div class="center-stats">
                <div class="center-stat">
                    <span class="center-stat-label">ACTIVE</span>
                    <span class="center-stat-value" id="total-drones">0</span>
                </div>
                <div class="center-stat" id="alert-box">
                    <span class="center-stat-label">ALERT</span>
                    <span class="center-stat-value" id="alert-status">CLEAR</span>
                </div>
            </div>

            <svg viewBox="0 0 200 200" class="compass-svg">
                <polygon id="compass-north" class="compass-tri" points="100,15 115,70 85,70" />
                <text x="100" y="10" class="compass-label">N</text>
                <polygon id="compass-south" class="compass-tri" points="100,185 115,130 85,130" />
                <text x="100" y="198" class="compass-label">S</text>
                <polygon id="compass-east" class="compass-tri" points="185,100 130,85 130,115" />
                <text x="195" y="104" class="compass-label">E</text>
                <polygon id="compass-west" class="compass-tri" points="15,100 70,85 70,115" />
                <text x="5" y="104" class="compass-label">W</text>
                <line x1="100" y1="70" x2="78" y2="52" class="compass-fov" />
                <line x1="100" y1="70" x2="122" y2="52" class="compass-fov" />
                <line x1="100" y1="130" x2="78" y2="148" class="compass-fov" />
                <line x1="100" y1="130" x2="122" y2="148" class="compass-fov" />
                <line x1="130" y1="100" x2="148" y2="78" class="compass-fov" />
                <line x1="130" y1="100" x2="148" y2="122" class="compass-fov" />
                <line x1="70" y1="100" x2="52" y2="78" class="compass-fov" />
                <line x1="70" y1="100" x2="52" y2="122" class="compass-fov" />
                <polygon id="compass-NE" class="compass-tri intercardinal" points="145,35 130,70 115,55" />
                <polygon id="compass-SE" class="compass-tri intercardinal" points="145,165 130,130 115,145" />
                <polygon id="compass-SW" class="compass-tri intercardinal" points="55,165 70,130 85,145" />
                <polygon id="compass-NW" class="compass-tri intercardinal" points="55,35 70,70 85,55" />
                <line x1="88" y1="88" x2="112" y2="112" class="compass-x" />
                <line x1="112" y1="88" x2="88" y2="112" class="compass-x" />
                <circle cx="100" cy="100" r="18" class="compass-center" />
            </svg>

            <div class="center-title">DRONE DETECTION<br>SECURITY CENTER</div>

            <button id="start-monitoring-btn" class="monitoring-btn">START MONITORING</button>
            <div class="center-feeds-status">
                <span class="dot"></span> FEEDS: <span id="feeds-online">4</span>/4
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js?v=10"></script>
</body>
</html>
